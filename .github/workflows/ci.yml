# B3：基本 CI — push/PR 時跑 lint + 單元測試 + vite 打包，把關回歸。
# 不跑 electron-builder dist：ffmpeg/mpv 二進位已被 .gitignore 排除，且打包屬發版步驟。
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
